name: Excavator

on:
  schedule:
    # Runs every day at 02:30 UTC
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  excavate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Scoop
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
          Add-Content -Path $env:GITHUB_PATH -Value "$env:USERPROFILE\scoop\shims"
        shell: pwsh

      - name: Install Scoop dependencies
        run: scoop install git hub
        shell: pwsh

      - name: Configure git author as github-actions
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        shell: pwsh

      - name: Checkver and autoupdate all manifests
        run: |
          $scoopHome = Resolve-Path (scoop prefix scoop)
          $upstream = "${{ github.repository }}:${{ github.ref_name }}"
          & "$scoopHome\bin\auto-pr.ps1" `
            -Upstream $upstream `
            -OriginBranch "${{ github.ref_name }}" `
            -CommitMessageFormat "<app>: Update to version <version>" `
            -Dir .\bucket `
            -Push `
            -SkipUpdated
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCOOP_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
